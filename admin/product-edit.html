    <script>
        var productId = null;
        var products = [];
        var productImages = {};
        var uploadedImages = [];
        
        function getUrlParam(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        async function loadProductData() {
            try {
                var [productResponse, imageResponse] = await Promise.all([
                    fetch('../product-data.json'),
                    fetch('../product-images.json')
                ]);
                
                var productData = await productResponse.json();
                var imageData = await imageResponse.json();
                
                products = productData.products || productData || [];
                productImages = imageData || {};
                
                productId = parseInt(getUrlParam('id'));
                
                if (productId) {
                    var product = products.find(function(p) { return p.id === productId; });
                    if (product) {
                        populateForm(product);
                        loadProductImages(product.code);
                    } else {
                        alert('未找到该产品');
                    }
                }
            } catch (error) {
                console.log('加载数据失败:', error);
            }
        }
        
        function populateForm(product) {
            document.getElementById('productName').value = product.name || '';
            document.getElementById('productOE').value = product.code || '';
            document.getElementById('productCategory').value = product.category || '';
            document.getElementById('productBrand').value = product.series || '';
            document.getElementById('productPrice').value = product.price || '';
            document.getElementById('productStock').value = product.stock || '';
            document.getElementById('productDescription').value = product.description || '';
            document.getElementById('productStatus').value = product.status || (product.stock === '充足' ? 'active' : 'inactive');
            document.getElementById('showInFront').value = String(product.showInFront === true || product.showInFront === 'true');
        }
        
        function loadProductImages(productCode) {
            var currentImagesDiv = document.getElementById('currentImages');
            currentImagesDiv.innerHTML = '';
            
            if (productCode && productImages[productCode] && productImages[productCode].length > 0) {
                productImages[productCode].forEach(function(imagePath, index) {
                    var imgContainer = document.createElement('div');
                    imgContainer.style.position = 'relative';
                    imgContainer.style.margin = '5px';
                    
                    var img = document.createElement('img');
                    img.src = '../' + imagePath;
                    img.style.width = '100px';
                    img.style.height = '100px';
                    img.style.objectFit = 'cover';
                    img.style.border = '1px solid #ddd';
                    img.style.borderRadius = '4px';
                    
                    var deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '删除';
                    deleteBtn.style.position = 'absolute';
                    deleteBtn.style.top = '-10px';
                    deleteBtn.style.right = '-10px';
                    deleteBtn.style.width = '24px';
                    deleteBtn.style.height = '24px';
                    deleteBtn.style.borderRadius = '50%';
                    deleteBtn.style.background = '#dc3545';
                    deleteBtn.style.color = 'white';
                    deleteBtn.style.border = 'none';
                    deleteBtn.style.cursor = 'pointer';
                    deleteBtn.style.fontSize = '12px';
                    deleteBtn.onclick = function() {
                        deleteImage(productCode, index);
                    };
                    
                    imgContainer.appendChild(img);
                    imgContainer.appendChild(deleteBtn);
                    currentImagesDiv.appendChild(imgContainer);
                });
            } else {
                currentImagesDiv.innerHTML = '<p style="color: #666;">暂无图片</p>';
            }
        }
        
        function deleteImage(productCode, index) {
            if (productImages[productCode] && productImages[productCode][index]) {
                productImages[productCode].splice(index, 1);
                
                try {
                    localStorage.setItem('product-images', JSON.stringify(productImages));
                    loadProductImages(productCode);
                    alert('图片删除成功');
                } catch (e) {
                    console.log('删除失败:', e);
                    alert('删除失败');
                }
            }
        }
        
        document.getElementById('productImage').addEventListener('change', function(e) {
            var files = e.target.files;
            var uploadedImagesDiv = document.getElementById('uploadedImages');
            
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                var reader = new FileReader();
                
                reader.onload = function(event) {
                    var imgContainer = document.createElement('div');
                    imgContainer.style.position = 'relative';
                    imgContainer.style.margin = '5px';
                    
                    var img = document.createElement('img');
                    img.src = event.target.result;
                    img.style.width = '100px';
                    img.style.height = '100px';
                    img.style.objectFit = 'cover';
                    img.style.border = '1px solid #0F4F9A';
                    img.style.borderRadius = '4px';
                    
                    var deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '×';
                    deleteBtn.style.position = 'absolute';
                    deleteBtn.style.top = '-10px';
                    deleteBtn.style.right = '-10px';
                    deleteBtn.style.width = '24px';
                    deleteBtn.style.height = '24px';
                    deleteBtn.style.borderRadius = '50%';
                    deleteBtn.style.background = '#dc3545';
                    deleteBtn.style.color = 'white';
                    deleteBtn.style.border = 'none';
                    deleteBtn.style.cursor = 'pointer';
                    deleteBtn.style.fontSize = '14px';
                    deleteBtn.onclick = function() {
                        imgContainer.remove();
                        var index = uploadedImages.indexOf(event.target.result);
                        if (index > -1) {
                            uploadedImages.splice(index, 1);
                        }
                    };
                    
                    imgContainer.appendChild(img);
                    imgContainer.appendChild(deleteBtn);
                    uploadedImagesDiv.appendChild(imgContainer);
                    uploadedImages.push(event.target.result);
                };
                
                reader.readAsDataURL(file);
            }
        });
        
        function saveProduct() {
            var product = {
                id: productId,
                name: document.getElementById('productName').value,
                code: document.getElementById('productOE').value,
                category: document.getElementById('productCategory').value,
                series: document.getElementById('productBrand').value,
                price: parseFloat(document.getElementById('productPrice').value),
                stock: document.getElementById('productStock').value,
                description: document.getElementById('productDescription').value,
                status: document.getElementById('productStatus').value,
                showInFront: document.getElementById('showInFront').value === 'true'
            };
            
            var index = products.findIndex(function(p) { return p.id === productId; });
            if (index !== -1) {
                products[index] = product;
                
                try {
                    localStorage.setItem('product-show-settings', JSON.stringify(products));
                    
                    if (uploadedImages.length > 0) {
                        var productCode = document.getElementById('productOE').value;
                        if (!productImages[productCode]) {
                            productImages[productCode] = [];
                        }
                        uploadedImages.forEach(function(imgBase64) {
                            productImages[productCode].push('uploads/' + Date.now() + '-' + Math.random().toString(36).substr(2, 9) + '.jpg');
                        });
                        localStorage.setItem('product-images', JSON.stringify(productImages));
                    }
                    
                    alert('产品修改成功');
                    window.location.href = 'products.html';
                } catch (e) {
                    console.log('保存失败:', e);
                    alert('保存失败，本地存储已满');
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProductData();
            
            document.getElementById('saveProduct').addEventListener('click', saveProduct);
            
            var menuItems = document.querySelectorAll('.menu-item');
            
            menuItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        if (e.target.closest('.submenu') || e.target.closest('.submenu-item')) {
                            return;
                        }
                        
                        e.preventDefault();
                        
                        menuItems.forEach(function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
