<script>
        document.addEventListener('DOMContentLoaded', function() {
            var menuItems = document.querySelectorAll('.menu-item');
            
            menuItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        if (e.target.closest('.submenu') || e.target.closest('.submenu-item')) {
                            return;
                        }
                        
                        e.preventDefault();
                        
                        menuItems.forEach(function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
            
            var searchBtn = document.getElementById('searchBtn');
            searchBtn.addEventListener('click', function() {
                var brand = document.getElementById('brand').value;
                var model = document.getElementById('model').value.trim();
                var chassis = document.getElementById('chassis').value.trim();
                
                if (!brand && !model && !chassis) {
                    alert('请至少输入一个查询条件');
                    return;
                }
                
                var oeNumbers = [
                    { oe: '0001402780', name: '燃油滤清器', category: '发动机' },
                    { oe: '0054203712', name: '刹车片', category: '制动' },
                    { oe: '2710940201', name: '空气滤清器', category: '发动机' },
                    { oe: '2113200175', name: '减震器', category: '悬挂' }
                ];
                
                displayOeResults(oeNumbers);
            });
        });
        
        function displayOeResults(oeNumbers) {
            var oeGrid = document.getElementById('oeGrid');
            oeGrid.innerHTML = '';
            
            oeNumbers.forEach(function(item) {
                var oeCard = document.createElement('div');
                oeCard.className = 'oe-card';
                oeCard.innerHTML = `
                    <div class="oe-code">${item.oe}</div>
                    <div class="oe-name">${item.name}</div>
                    <div class="oe-category">${item.category}</div>
                    <a href="../product-detail.html?oe=${encodeURIComponent(item.oe)}" class="oe-link">查看详情</a>
                `;
                oeGrid.appendChild(oeCard);
            });
            
            document.getElementById('resultSection').style.display = 'block';
        }
        
        function clearSearch() {
            document.getElementById('brand').value = '';
            document.getElementById('model').value = '';
            document.getElementById('chassis').value = '';
            document.getElementById('resultSection').style.display = 'none';
        }
</script>
