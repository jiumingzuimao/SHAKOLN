            (function(item) {
                item.addEventListener('click', function(e) {
                    var target = e.target;
                    
                    if (target.closest('.submenu') || target.closest('.submenu-item')) {
                        return;
                    }
                    
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        
                        
                        (function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
        });
</script>

<script>
        document.addEventListener('DOMContentLoaded', function() {
            // 侧边栏菜单功能
            var menuItems = document.querySelectorAll('.menu-item');
            
            menuItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        // 检查是否点击了二级菜单区域
                        if (e.target.closest('.submenu') || e.target.closest('.submenu-item')) {
                            return;
                        }
                        
                        e.preventDefault();
                        
                        // 关闭其他菜单
                        menuItems.forEach(function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        // 确保当前菜单展开
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
        });
</script>
