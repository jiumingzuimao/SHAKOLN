        ];
        
        document.addEventListener('DOMContentLoaded', function() {
            var menuItems = document.querySelectorAll('.menu-item');
            
            menuItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        if (e.target.closest('.submenu') || e.target.closest('.submenu-item')) {
                            return;
                        }
                        
                        e.preventDefault();
                        
                        menuItems.forEach(function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
            
            loadCarModels();
            
            document.querySelector('.btn-secondary').addEventListener('click', function() {
                window.location.href = 'car-model-add.html';
            });
            
            // 分页按钮事件
            document.getElementById('prevPage').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    renderCarModelsWithPagination();
                }
            });
            
            document.getElementById('nextPage').addEventListener('click', function() {
                const totalPages = Math.ceil(allCarModels.length / pageSize);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderCarModelsWithPagination();
                }
            });
        });
        
        async function loadCarModels() {
            const tableBody = document.getElementById('carModelsTableBody');
            try {
                const response = await fetch('/api/car-models');
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.data) {
                        allCarModels = data.data;
                        currentPage = 1;
                        renderCarModelsWithPagination();
                    } else {
                        allCarModels = mockCarModels;
                        currentPage = 1;
                        renderCarModelsWithPagination();
                    }
                } else {
                    allCarModels = mockCarModels;
                    currentPage = 1;
                    renderCarModelsWithPagination();
                }
            } catch (error) {
                console.error('加载车型数据失败，使用本地数据:', error);
                allCarModels = mockCarModels;
                currentPage = 1;
                renderCarModelsWithPagination();
            }
        }
        
        function renderCarModelsWithPagination() {
            const totalPages = Math.ceil(allCarModels.length / pageSize);
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const currentPageModels = allCarModels.slice(start, end);
            
            // 更新分页信息
            document.getElementById('totalCount').textContent = allCarModels.length;
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            // 渲染当前页数据
            renderCarModels(currentPageModels);
            
            // 渲染分页按钮
            renderPagination(totalPages);
        }
        
        function renderCarModels(carModels) {
            const tableBody = document.getElementById('carModelsTableBody');
            tableBody.innerHTML = '';
            
            if (carModels.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" style="text-align: center;">暂无数据</td></tr>';
                return;
            }
            
            carModels.forEach(model => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox"></td>
                    <td>${model.id}</td>
                    <td>${model.brand}</td>
                    <td>${model.series}</td>
                    <td>${model.model}</td>
                    <td>${model.chassis}</td>
                    <td>${model.years}</td>
                    <td><span style="color: ${model.status === 'active' ? '#4CAF50' : '#999'}">${model.status === 'active' ? '启用' : '禁用'}</span></td>
                    <td>
                        <button class="btn btn-primary" onclick="editCarModel(${model.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteCarModel(${model.id})">删除</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        function renderPagination(totalPages) {
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';
            
            // 只显示最多7个页码
            let startPage = Math.max(1, currentPage - 3);
            let endPage = Math.min(totalPages, currentPage + 3);
            
            for (let i = startPage; i <= endPage; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                if (i === currentPage) {
                    button.classList.add('active');
                }
                button.addEventListener('click', function() {
                    currentPage = i;
                    renderCarModelsWithPagination();
                });
                pageNumbers.appendChild(button);
            }
        }
        
        function editCarModel(id) {
            window.location.href = `car-model-add.html?id=${id}`;
        }
        
        function deleteCarModel(id) {
            if (confirm('确定要删除该车型吗？')) {
                console.log('删除车型:', id);
            }
        }
    </script>
</body></html>
