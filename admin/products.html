        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            cursor: pointer;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-switch .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }
        
        .toggle-switch .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        .toggle-switch input:checked + .slider {
            background-color: #0F4F9A;
        }
        
        .toggle-switch input:focus + .slider {
            box-shadow: 0 0 1px #0F4F9A;
        }
        
        .toggle-switch input:checked + .slider:before {
            transform: translateX(22px);
        }

    <script>
        var currentPage = 1;
        var pageSize = 20;
        var sortField = 'code';
        var sortOrder = 'asc';
        var searchKeyword = '';
        var categoryFilter = '';
        var brandFilter = '';
        var products = [];
        var productImages = {};
        var isLoading = false;
        var isDataLoaded = false;
        
        function sortProducts(products, field, order) {
            return [...products].sort(function(a, b) {
                var valueA = a[field] ? a[field].toLowerCase() : '';
                var valueB = b[field] ? b[field].toLowerCase() : '';
                if (valueA < valueB) return order === 'asc' ? -1 : 1;
                if (valueA > valueB) return order === 'asc' ? 1 : -1;
                return 0;
            });
        }
        
        async function loadProducts() {
            if (isLoading) return;
            if (isDataLoaded) {
                renderProducts();
                return;
            }
            
            isLoading = true;
            
            try {
                var [productResponse, imageResponse] = await Promise.all([
                    fetch('../product-data.json', { cache: 'force-cache' }),
                    fetch('../product-images.json', { cache: 'force-cache' })
                ]);
                
                var productData = await productResponse.json();
                var imageData = await imageResponse.json();
                
                products = productData.products || productData || [];
                productImages = imageData || {};
                
                try {
                    var orderResponse = await fetch('/api/product-orders');
                    var orderData = await orderResponse.json();
                    if (orderData.success && orderData.data) {
                        orderData.data.forEach(function(savedProduct) {
                            var product = products.find(function(p) { return p.code === savedProduct.code; });
                            if (product && savedProduct.frontOrder !== undefined) {
                                product.frontOrder = savedProduct.frontOrder;
                            }
                        });
                    }
                } catch (e) {
                    console.log('加载保存的设置失败:', e);
                }
                
                isDataLoaded = true;
                renderProducts();
            } catch (error) {
                console.log('加载数据失败:', error);
                document.getElementById('productTableBody').innerHTML = '<tr><td colspan="10" style="text-align:center;">加载失败</td></tr>';
            } finally {
                isLoading = false;
            }
        }
        
        function searchProducts() {
            searchKeyword = document.getElementById('searchInput').value;
            categoryFilter = document.getElementById('categoryFilter').value;
            brandFilter = document.getElementById('brandFilter').value;
            currentPage = 1;
            renderProducts();
        }
        
        document.getElementById('sortField').addEventListener('change', function() {
            sortField = this.value;
            currentPage = 1;
            renderProducts();
        });
        
        document.getElementById('sortOrder').addEventListener('change', function() {
            sortOrder = this.value;
            currentPage = 1;
            renderProducts();
        });
        
        document.getElementById('pageSizeSelect').addEventListener('change', function() {
            pageSize = parseInt(this.value);
            currentPage = 1;
            renderProducts();
        });
        
        function renderProducts() {
            var filteredProducts = products.filter(function(product) {
                var matchKeyword = !searchKeyword || 
                    (product.name && product.name.toLowerCase().includes(searchKeyword.toLowerCase())) ||
                    (product.code && product.code.toLowerCase().includes(searchKeyword.toLowerCase()));
                var matchCategory = !categoryFilter || product.category === categoryFilter;
                var matchBrand = !brandFilter || product.series === brandFilter;
                return matchKeyword && matchCategory && matchBrand;
            });
            
            filteredProducts = sortProducts(filteredProducts, sortField, sortOrder);
            
            var totalItems = filteredProducts.length;
            var totalPages = Math.ceil(totalItems / pageSize);
            var startIndex = (currentPage - 1) * pageSize;
            var endIndex = startIndex + pageSize;
            var displayProducts = filteredProducts.slice(startIndex, endIndex);
            
            var tableBody = document.getElementById('productTableBody');
            if (displayProducts.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="10" style="text-align:center;">没有找到产品</td></tr>';
            } else {
                var html = '';
                displayProducts.forEach(function(product) {
                    var isActive = product.status === 'active';
                    var statusText = isActive ? '上架' : '下架';
                    
                    var imageHtml = '<div style="width:60px;height:60px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#999;">无图</div>';
                    if (product.code && productImages[product.code] && productImages[product.code].length > 0) {
                        var firstImage = productImages[product.code][0];
                        imageHtml = '<img src="../' + firstImage + '" alt="' + product.name + '" style="width:60px;height:60px;object-fit:cover;">';
                    }
                    
                    var frontOrder = product.frontOrder || '';
                    var orderInput = '<input type="number" min="0" max="999" value="' + frontOrder + '" style="width:60px;padding:5px;border:1px solid #ddd;border-radius:4px;" onchange="saveFrontOrder(' + product.id + ', this.value)">';
                    
                    var statusToggle = '<label class="toggle-switch" style="margin:0 auto;display:block;width:48px;">' +
                        '<input type="checkbox" ' + (isActive ? 'checked' : '') + ' onchange="toggleProductStatus(' + product.id + ', this.checked)">' +
                        '<span class="slider"></span>' +
                        '</label><span style="display:block;text-align:center;margin-top:5px;color:' + (isActive ? '#28a745' : '#dc3545') + ';">' + statusText + '</span>';
                    
                    html += '<tr>' +
                        '<td><input type="checkbox" class="product-checkbox" data-id="' + product.id + '"></td>' +
                        '<td>' + (product.id || '-') + '</td>' +
                        '<td>' + imageHtml + '</td>' +
                        '<td>' + (product.name || '-') + '</td>' +
                        '<td>' + (product.code || '-') + '</td>' +
                        '<td>' + (product.series || '-') + '</td>' +
                        '<td>' + (product.category || '-') + '</td>' +
                        '<td>' + statusToggle + '</td>' +
                        '<td>' + orderInput + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-primary" onclick="editProduct(' + product.id + ')">编辑</button>' +
                            '<button class="btn btn-sm btn-danger" onclick="deleteProduct(' + product.id + ')">删除</button>' +
                        '</td>' +
                        '</tr>';
                });
                tableBody.innerHTML = html;
            }
            
            document.getElementById('paginationInfo').innerHTML = 
                '显示第 ' + (startIndex + 1) + ' - ' + Math.min(endIndex, totalItems) + ' 条，共 ' + totalItems + ' 条记录';
            
            renderPagination(totalPages);
        }
        
        function renderPagination(totalPages) {
            var pagination = document.getElementById('pagination');
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            var html = '<button class="page-btn" onclick="goToPage(1)" ' + (currentPage === 1 ? 'disabled' : '') + '>首页</button>';
            html += '<button class="page-btn" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
            
            for (var i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += '<button class="page-btn active">' + i + '</button>';
                } else if (i >= currentPage - 2 && i <= currentPage + 2) {
                    html += '<button class="page-btn" onclick="goToPage(' + i + ')">' + i + '</button>';
                } else if (i === 1 || i === totalPages) {
                    html += '<button class="page-btn" onclick="goToPage(' + i + ')">' + i + '</button>';
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span class="page-dots">...</span>';
                }
            }
            
            html += '<button class="page-btn" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
            html += '<span style="margin: 0 5px;">跳至:</span>';
            html += '<input type="number" id="pageInput" min="1" max="' + totalPages + '" style="width: 60px; padding: 5px; border: 1px solid #ddd; border-radius: 4px;">';
            html += '<button class="page-btn" style="margin-left: 5px;" onclick="goToPage(parseInt(document.getElementById(\'pageInput\').value))">跳转</button>';
            html += '<button class="page-btn" onclick="goToPage(' + totalPages + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>末页</button>';
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            var totalPages = Math.ceil(products.filter(function(product) {
                var matchKeyword = !searchKeyword || 
                    (product.name && product.name.toLowerCase().includes(searchKeyword.toLowerCase())) ||
                    (product.code && product.code.toLowerCase().includes(searchKeyword.toLowerCase()));
                var matchCategory = !categoryFilter || product.category === categoryFilter;
                var matchBrand = !brandFilter || product.series === brandFilter;
                return matchKeyword && matchCategory && matchBrand;
            }).length / pageSize);
            
            if (page < 1 || page > totalPages) {
                alert('请输入有效的页码');
                return;
            }
            currentPage = page;
            renderProducts();
        }
        
        function toggleSelectAll(checkbox) {
            document.querySelectorAll('.product-checkbox').forEach(function(cb) {
                cb.checked = checkbox.checked;
            });
        }
        
        function editProduct(id) {
            window.location.href = 'product-edit.html?id=' + id;
        }
        
        function deleteProduct(id) {
            if (confirm('确定要删除这个产品吗？')) {
                products = products.filter(function(p) { return p.id !== id; });
                renderProducts();
            }
        }
        
        function toggleProductStatus(productId, isActive) {
            var product = products.find(function(p) { return p.id === productId; });
            if (product) {
                product.status = isActive ? 'active' : 'inactive';
                
                fetch('/api/product-status', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ id: productId, status: product.status })
                })
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('HTTP error ' + response.status);
                    }
                    return response.json();
                })
                .then(function(data) {
                    console.log('服务器响应:', data);
                    if (data && data.success) {
                        renderProducts();
                    } else {
                        alert('保存失败: ' + (data ? data.message || '未知错误' : '无响应'));
                        product.status = isActive ? 'inactive' : 'active';
                        renderProducts();
                    }
                })
                .catch(function(error) {
                    console.log('保存失败:', error);
                    alert('保存失败，请检查服务器: ' + error.message);
                    product.status = isActive ? 'inactive' : 'active';
                    renderProducts();
                });
            }
        }
        
        function saveFrontOrder(productId, orderValue) {
            var product = products.find(function(p) { return p.id === productId; });
            if (product) {
                var order = parseInt(orderValue);
                if (isNaN(order) || order < 0) {
                    product.frontOrder = '';
                } else {
                    product.frontOrder = order;
                }
                
                // 保存到服务器
                var saveData = products.filter(p => p.frontOrder && p.frontOrder !== '').map(p => ({
                    code: p.code || p.oe,
                    frontOrder: p.frontOrder
                }));
                
                fetch('/api/product-orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(saveData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('序号设置已保存到服务器，刷新前台首页即可看到效果');
                    } else {
                        alert('保存失败');
                    }
                })
                .catch(error => {
                    console.log('保存失败:', error);
                    alert('保存失败，请检查服务器');
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            document.getElementById('searchInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    searchProducts();
                }
            });
            
            var menuItems = document.querySelectorAll('.menu-item');
            
            menuItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        if (e.target.closest('.submenu') || e.target.closest('.submenu-item')) {
                            return;
                        }
                        
                        e.preventDefault();
                        
                        menuItems.forEach(function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
