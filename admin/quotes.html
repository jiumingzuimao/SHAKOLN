<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>报价管理 - 后台管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: '微软雅黑', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            min-height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background-color: #0F4F9A;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header .logo {
            text-align: center;
        }
        
        .sidebar-header h1 {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .sidebar-menu {
            padding: 20px 0;
        }
        
        .menu-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .menu-item:hover {
            background-color: rgba(255,255,255,0.1);
            border-left-color: #87CEEB;
        }
        
        .menu-item.active {
            background-color: rgba(135, 206, 235, 0.3);
            border-left-color: #87CEEB;
        }
        
        .menu-item a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            font-size: 16px;
        }
        
        .menu-item a span:first-child {
            display: flex;
            align-items: center;
        }
        
        .menu-item .menu-icon-img {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            filter: brightness(0) invert(1);
        }
        
        .menu-item .menu-arrow {
            font-size: 12px;
            transition: transform 0.3s;
        }
        
        .menu-item.active .menu-arrow {
            transform: rotate(90deg);
        }
        
        .submenu {
            padding-left: 0;
            padding-top: 0;
            margin-top: 20px;
            background-color: rgba(0, 0, 0, 0.35);
            display: none;
        }
        
        .submenu.active {

        .submenu-item {

        .submenu-item a {

            text-decoration: none;

        }
        
        .main-content {

            margin-left: 280px;

        }

        }

        }

        }
        
        .btn-outline {

            border: 1px solid #0F4F9A;
        }
        
        .btn-outline:hover {

        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,

            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .data-table th {

            font-weight: bold;
            color: #666;
        }
        
        .data-table tr:hover {
            background-color: #f9f9f9;
        }
        
        .status-pending {
            color: #FF9800;
            font-weight: bold;
        }
        
        .status-processing {
            color: #2196F3;
            font-weight: bold;
        }
        
        .status-completed {
            color: #4CAF50;
            font-weight: bold;
        }
        
        .status-cancelled {
            color: #9E9E9E;
            font-weight: bold;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background-color: white;

        }
        
        .pagination button.active {

            color: white;

        }

            .sidebar {
                width: 200px;
            }

                margin-left: 200px;
            }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal.show {
            display: flex;

        }

        .modal-content {

        }

        .modal-header h3 {

        }

        .close-btn {

            font-weight: bold;

        }

        .close-btn:hover {

        .modal-body .detail-row {

            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>

    <!-- 加载存储管理器 -->
    <script src="./js/storage-manager.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 10;
        let allQuotes = [];
        let filteredQuotes = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadQuotes();
            
            // 侧边栏菜单功能
            var menuItems = document.querySelectorAll('.menu-item');
            
            menuItems.forEach(function(item) {
                item.addEventListener('click', function(e) {
                    var submenu = this.querySelector('.submenu');
                    if (submenu) {
                        // 检查是否点击了二级菜单区域
                        if (e.target.closest('.submenu') || e.target.closest('.submenu-item')) {
                            return;
                        }
                        
                        e.preventDefault();
                        
                        // 关闭其他菜单
                        menuItems.forEach(function(menu) {
                            if (menu !== item) {
                                menu.classList.remove('active');
                                var otherSubmenu = menu.querySelector('.submenu');
                                if (otherSubmenu) otherSubmenu.classList.remove('active');
                            }
                        });
                        
                        // 确保当前菜单展开
                        this.classList.add('active');
                        submenu.classList.add('active');
                    }
                });
            });
        });

        function loadQuotes() {
            console.log('=== 开始加载报价数据 ===');
            console.log('storageManager 是否存在:', typeof storageManager);
            
            // 直接检查 localStorage
            console.log('检查 localStorage 中的所有数据:');
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                console.log(`  ${key}:`, value);
            }
            
            allQuotes = storageManager.getQuotes();
            console.log('从 storageManager 读取的报价数据:', allQuotes);
            
            filteredQuotes = [...allQuotes];
            renderQuotes();
        }

        function searchQuotes() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            filteredQuotes = allQuotes.filter(quote => {
                let matchesKeyword = true;
                let matchesStatus = true;
                
                if (keyword) {
                    matchesKeyword = 
                        (quote.contactName && quote.contactName.toLowerCase().includes(keyword)) ||
                        (quote.contactPhone && quote.contactPhone.toLowerCase().includes(keyword)) ||
                        (quote.oeNumber && quote.oeNumber.toLowerCase().includes(keyword)) ||
                        (quote.carModel && quote.carModel.toLowerCase().includes(keyword));
                }
                
                if (statusFilter) {
                    matchesStatus = quote.status === statusFilter;
                }
                
                return matchesKeyword && matchesStatus;
            });
            
            currentPage = 1;
            renderQuotes();
        }

        function refreshQuotes() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            loadQuotes();
        }

        function renderQuotes() {
            const tbody = document.getElementById('quotesTableBody');
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageQuotes = filteredQuotes.slice(startIndex, endIndex);
            
            if (pageQuotes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: #999;">暂无报价数据</td></tr>';
            } else {
                tbody.innerHTML = pageQuotes.map(quote => `
                    <tr>
                        <td>${quote.id}</td>
                        <td>${quote.contactName || '-'}</td>
                        <td>${quote.contactPhone || '-'}</td>
                        <td>${quote.brand === 'benz' ? '奔驰' : quote.brand === 'bmw' ? '宝马' : quote.brand || '-'}</td>
                        <td>${quote.oeNumber || '-'}</td>
                        <td>${quote.quantity || '-'}</td>
                        <td><span class="status-${quote.status}">${getStatusText(quote.status)}</span></td>
                        <td>${formatDate(quote.createdAt)}</td>
                        <td>
                            <button class="btn btn-primary" onclick="viewQuote('${quote.id}')">查看</button>
                            <button class="btn btn-success" onclick="updateStatus('${quote.id}', 'processing')" style="display: ${quote.status === 'pending' ? 'inline-block' : 'none'}">处理</button>
                            <button class="btn btn-success" onclick="updateStatus('${quote.id}', 'completed')" style="display: ${quote.status === 'processing' ? 'inline-block' : 'none'}">完成</button>
                            <button class="btn btn-danger" onclick="deleteQuote('${quote.id}')">删除</button>
                        </td>
                    </tr>
                `).join('');
            }
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredQuotes.length / pageSize);
            const pageInfo = document.getElementById('pageInfo');
            const pagination = document.getElementById('pagination');
            
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, filteredQuotes.length);
            pageInfo.textContent = `显示第 ${filteredQuotes.length > 0 ? start : 0} - ${end} 条，共 ${filteredQuotes.length} 条记录`;
            
            let paginationHtml = '';
            
            if (totalPages > 1) {
                paginationHtml += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
                
                for (let i = 1; i <= totalPages; i++) {
                    paginationHtml += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
                }
                
                paginationHtml += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            }
            
            pagination.innerHTML = paginationHtml;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredQuotes.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderQuotes();
        }

        function getStatusText(status) {
            const statusMap = {
                'pending': '待处理',
                'processing': '处理中',
                'completed': '已完成',
                'cancelled': '已取消'
            };
            return statusMap[status] || status;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function viewQuote(id) {
            const quote = allQuotes.find(q => q.id === id);
            if (!quote) return;
            
            const partTypeMap = {
                'engine': '发动机配件',
                'chassis': '底盘配件',
                'electrical': '电气配件',
                'brake': '制动系统',
                'other': '其他配件'
            };
            
            const brandMap = {
                'benz': '奔驰',
                'bmw': '宝马'
            };
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">ID:</span>
                    <span class="detail-value">${quote.id}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">联系人:</span>
                    <span class="detail-value">${quote.contactName || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">电话:</span>
                    <span class="detail-value">${quote.contactPhone || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">邮箱:</span>
                    <span class="detail-value">${quote.contactEmail || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">品牌:</span>
                    <span class="detail-value">${brandMap[quote.brand] || quote.brand || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">车型:</span>
                    <span class="detail-value">${quote.carModel || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">配件类型:</span>
                    <span class="detail-value">${partTypeMap[quote.partType] || quote.partType || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">OE号码:</span>
                    <span class="detail-value">${quote.oeNumber || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">数量:</span>
                    <span class="detail-value">${quote.quantity || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">备注:</span>
                    <span class="detail-value">${quote.remarks || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">状态:</span>
                    <span class="detail-value status-${quote.status}">${getStatusText(quote.status)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">提交时间:</span>
                    <span class="detail-value">${formatDate(quote.createdAt)}</span>
                </div>
                ${quote.updatedAt ? `
                <div class="detail-row">
                    <span class="detail-label">更新时间:</span>
                    <span class="detail-value">${formatDate(quote.updatedAt)}</span>
                </div>
                ` : ''}
            `;
            
            document.getElementById('detailModal').classList.add('show');
        }

        function updateStatus(id, status) {
            if (confirm(`确定要将状态更新为「${getStatusText(status)}」吗？`)) {
                storageManager.updateQuoteStatus(id, status);
                loadQuotes();
            }
        }

        function deleteQuote(id) {
            if (confirm('确定要删除这条报价记录吗？')) {
                storageManager.deleteQuote(id);
                loadQuotes();
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
